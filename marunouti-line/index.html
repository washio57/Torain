<!DOCTYPE html>
<html lang="ja">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>丸ノ内線 駅メロ</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- 背景車両 -->
  <div class="bg-image"></div>





  <main class="container">

    <!-- 路線タイトル -->
    <div class="line-title">

      <img
        src="icons/marunouchi.png"
        class="line-icon"
      >

      <h1>丸ノ内線</h1>

    </div>





    <!-- ===================================== -->
    <!-- 駅カード ここから -->
    <!-- ===================================== -->

    <section class="station-card">

      <!-- 駅名 -->
      <h2 class="station-name">
        M01 池袋
      </h2>





      <!-- 曲 -->
      <div class="melody-item">

        <div class="melody-title">
          A : フランソワ
        </div>

        <div class="button-group">

          <button onclick="playMusic('audio/M01A1.mp3','フランソワ')">
            再生
          </button>

          <button onclick="stopMusic()">
            停止
          </button>

        </div>

      </div>





      <!-- 曲 -->
      <div class="melody-item">

        <div class="melody-title">
          B : きらりトレイン
        </div>

        <div class="button-group">

          <button onclick="playMusic('audio/M01B1.mp3','きらりトレイン')">
            再生
          </button>

          <button onclick="stopMusic()">
            停止
          </button>

        </div>

      </div>

    </section>

    <!-- ===================================== -->
    <!-- 駅カード ここまで -->
    <!-- ===================================== -->





    <!-- ================================================= -->
    <!-- ↓↓↓ このブロックをコピペして追加 ↓↓↓ -->
    <!-- ================================================= -->

    <section class="station-card">

      <h2 class="station-name">
        M02 新大塚
      </h2>





      <div class="melody-item">

        <div class="melody-title">
          A : もうすぐ扉が閉まります
        </div>

        <div class="button-group">

          <button onclick="playMusic('audio/M02A1.mp3','もうすぐ扉が閉まります')">
            再生
          </button>

          <button onclick="stopMusic()">
            停止
          </button>

        </div>

      </div>





      <div class="melody-item">

        <div class="melody-title">
          B : ドリーム駅
        </div>

        <div class="button-group">

          <button onclick="playMusic('audio/M02B1.mp3','ドリーム駅')">
            再生
          </button>

          <button onclick="stopMusic()">
            停止
          </button>

        </div>

      </div>

    </section>

    <!-- ================================================= -->
    <!-- ↑↑↑ このブロックをコピペして追加 ↑↑↑ -->
    <!-- ================================================= -->





  </main>





  <!-- 下部固定プレイヤー -->
  <div class="music-bar">

    <div class="music-left">

      <div class="playing-label">
        NOW PLAYING
      </div>

      <div
        class="now-playing"
        id="nowPlaying"
      >
        再生されていません
      </div>

    </div>





    <div class="music-right">

      <!-- ループ -->
      <label class="loop-wrap">

        <input
          type="checkbox"
          id="loopToggle"
        >

        ループ

      </label>





      <!-- シークバー -->
      <input
        type="range"
        id="seekBar"
        value="0"
        min="0"
        max="100"
      >

    </div>

  </div>





  <!-- audio -->
  <audio
    id="audio-player"
    preload="auto"
  ></audio>





  <script>

    const player =
      document.getElementById(
        "audio-player"
      );

    const seekBar =
      document.getElementById(
        "seekBar"
      );

    const loopToggle =
      document.getElementById(
        "loopToggle"
      );

    const nowPlaying =
      document.getElementById(
        "nowPlaying"
      );





    function playMusic(file,name){

      player.src = file;

      player.loop =
        loopToggle.checked;

      player.play();

      nowPlaying.textContent =
        name;
    }





    function stopMusic(){

      player.pause();

      player.currentTime = 0;

      nowPlaying.textContent =
        "再生されていません";
    }





    player.addEventListener(
      "timeupdate",
      () => {

        if(player.duration){

          seekBar.value =
            (player.currentTime
            / player.duration)
            * 100;
        }

      }
    );





    seekBar.addEventListener(
      "input",
      () => {

        if(player.duration){

          player.currentTime =
            (seekBar.value / 100)
            * player.duration;
        }

      }
    );

  </script>

</body>
</html>
